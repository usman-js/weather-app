<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Usman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <div class="search">
        <input type="text" placeholder="Enter City Name" spellcheck="false" id="city-input">
        <button id="search-btn"><img src="images/search.png" alt=""></button>
    </div>
    <div class="error">Invalid City Name</div>
    <div class="weather">
        <img src="images/snow.png" alt="Weather Icon" class="weather-img">
        <h1 class="temp">25°C</h1>
        <h2 class="city">New York</h2>
    </div>
    <div class="details">
        <div class="col1">
            <img src="images/humidity.png" alt="">
            <h3 class="humidity">60%</h3>
            <p>Humidity</p>
        </div>


        <div class="col2">
            <img src="images/wind.png" alt="">
            <h3 class="wind-speed">10 km/h</h3>
            <p>Wind Speed</p>
        </div>
    </div>

</div>


    <script src="script.js"></script>
</body>
</html>
